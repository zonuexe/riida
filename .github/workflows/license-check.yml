name: License Check

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  rust-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-all-crates: true
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Check Rust dependency licenses
        run: cargo deny --manifest-path src-tauri/Cargo.toml check --config deny.toml licenses

  npm-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check npm dependency licenses
        run: npm run check:licenses:npm

  third-party-notices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: npm ci
      - name: Check bundled third-party notices
        run: npm run check:notices
