name: Nightly

# Heavy, slow quality checks kept off the per-push gate. They run on a nightly
# schedule and on demand, and publish their reports as workflow artifacts. The
# mutation jobs exit non-zero when the mutation score regresses, so a red
# nightly is an actionable signal rather than a merge blocker.
on:
  schedule:
    - cron: "0 18 * * *" # 18:00 UTC (03:00 JST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-mutation:
    name: Rust mutation testing
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants,cargo-nextest

      - name: Run Rust mutation testing
        # Reporting-only: lib.rs is dominated by #[tauri::command] handlers and
        # IO (thumbnails, EPUB parsing, watcher) that are not unit-testable
        # without a running app, so surviving mutants are expected. cargo-mutants
        # exits 2 when mutants survive — treat that as success and rely on the
        # uploaded report. Genuine failures (usage 1, timeout 3, broken baseline
        # 4) still fail the job.
        run: |
          set +e
          npm run mutants:rust
          code=$?
          set -e
          if [ "$code" -eq 0 ] || [ "$code" -eq 2 ]; then
            echo "cargo-mutants exit $code (0 = all caught, 2 = surviving mutants; reporting-only)"
            exit 0
          fi
          echo "cargo-mutants failed with exit $code"
          exit "$code"

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-mutants
          path: src-tauri/mutants.out/
          if-no-files-found: ignore

  frontend-mutation:
    name: Frontend mutation testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend mutation testing
        run: npm run mutants:frontend

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: reports/mutation/
          if-no-files-found: ignore

  rust-coverage:
    name: Rust coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # cargo-llvm-cov uses these tools directly; on the rustup-style CI
          # toolchain they ship with the component (the Nix dev shell wires
          # LLVM_COV/LLVM_PROFDATA instead).
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Generate Rust coverage report
        run: npm run cov:rust:html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-html
          path: src-tauri/target/llvm-cov/html/
          if-no-files-found: ignore

  e2e:
    name: Linux E2E smoke (tauri-driver)
    # tauri-driver has no macOS support, so this runs against Linux WebKitGTK,
    # not the WKWebView riida ships on macOS. It catches gross launch/render
    # regressions only — see e2e/wdio.conf.js and AGENTS.md for the caveat.
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-C debuginfo=0"
      # Headless WebKitGTK in CI is more stable with compositing/DMABUF off.
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Install WebDriver runtime
        run: sudo apt-get install -y --no-install-recommends webkit2gtk-driver xvfb

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Build the app (no bundle)
        run: npm run tauri build -- --no-bundle

      - name: Run E2E smoke test
        run: xvfb-run -a npm run e2e
