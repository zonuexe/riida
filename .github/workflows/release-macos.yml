name: release-macos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    name: build-macos-${{ matrix.target }}
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-audit,cargo-machete

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch libpdfium
        run: node scripts/fetch-pdfium.mjs ${{ matrix.target }}

      - name: Run release verification checks
        run: npm run check:release

      - name: Build macOS release bundle
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "riida ${{ github.ref_name }}"
          releaseBody: "Automated macOS build for riida."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Build macOS workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0.6.0
        with:
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "riida-[target-triple]-[bundle]"
          args: --target ${{ matrix.target }}
