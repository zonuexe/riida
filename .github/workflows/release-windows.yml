name: release-windows

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    name: build-windows-x86_64
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-audit,cargo-machete

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Rust verification checks
        run: npm run check:rust

      - name: Build Windows release bundle
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "riida ${{ github.ref_name }}"
          releaseBody: "Automated Windows build for riida."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Build Windows workflow artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: tauri-apps/tauri-action@v0.6.0
        with:
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "riida-[target-triple]-[bundle]"
          args: --target x86_64-pc-windows-msvc
