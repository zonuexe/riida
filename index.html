<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>riida</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app-shell two-pane">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <p class="eyebrow">Local PDF Library</p>
          <h1>riida</h1>
          <p class="sidebar-copy">
            ホーム、ディレクトリ、今後はタグからも蔵書へアクセスできるようにしていきます。
          </p>
        </div>
        <section class="sidebar-tools">
          <label class="sidebar-search-label" for="library-search">蔵書を検索</label>
          <input
            id="library-search"
            class="library-search sidebar-search"
            type="search"
            placeholder="タイトルやパスで検索"
          />
        </section>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
      </aside>

      <section class="main-pane">
        <button
          id="sidebar-toggle"
          class="sidebar-edge-toggle"
          type="button"
          aria-expanded="true"
          aria-controls="sidebar"
        >
          ≪
        </button>
        <header class="main-header panel">
          <div>
            <h2 id="main-title">ホーム</h2>
            <p class="panel-note" id="main-description">蔵書情報を読み込み中...</p>
          </div>
        </header>

        <section id="home-view">
          <section class="panel-grid">
            <article class="panel">
              <h2>監視対象</h2>
              <p id="watch-root">Rust 側から設定を読み込み中...</p>
              <p class="panel-note" id="excluded-rules">除外ルールを読み込み中...</p>
              <p class="panel-note" id="scan-status">起動時スキャンとフォルダ監視を開始しています...</p>
            </article>
            <article class="panel">
              <h2>現在の蔵書数</h2>
              <p class="stat" id="indexed-count">0</p>
            </article>
          </section>

          <section class="panel">
            <div class="library-header">
              <h2>本棚</h2>
            </div>
            <div id="book-results">
              <div class="empty-state">読み込み中...</div>
            </div>
          </section>
        </section>

        <section id="pdf-view" class="pdf-view" hidden>
          <article class="viewer-panel">
            <div class="viewer-stage">
              <iframe id="pdf-frame" title="PDF preview"></iframe>
            </div>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
