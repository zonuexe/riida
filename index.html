<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>riida</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app-shell two-pane">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <p class="eyebrow">Local PDF Library</p>
          <h1>riida</h1>
          <p class="sidebar-copy">
            ホーム、ディレクトリ、今後はタグからも蔵書へアクセスできるようにしていきます。
          </p>
        </div>
        <section class="sidebar-tools">
          <label class="sidebar-search-label" for="library-search">蔵書を検索</label>
          <input
            id="library-search"
            class="library-search sidebar-search"
            type="search"
            placeholder="タイトルやパスで検索"
          />
        </section>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
      </aside>

      <section class="main-pane">
        <button
          id="sidebar-toggle"
          class="sidebar-edge-toggle"
          type="button"
          aria-expanded="true"
          aria-controls="sidebar"
        >
          ≪
        </button>
        <div class="navigation-controls" aria-label="履歴移動">
          <button id="nav-back" class="navigation-button" type="button" aria-label="戻る">
            &lt;
          </button>
          <button id="nav-forward" class="navigation-button" type="button" aria-label="進む">
            &gt;
          </button>
        </div>

        <section id="home-view">
          <section class="panel-grid">
            <article class="panel">
              <h2>監視対象</h2>
              <p id="watch-root">Rust 側から設定を読み込み中...</p>
              <p class="panel-note" id="excluded-rules">除外ルールを読み込み中...</p>
              <p class="panel-note" id="scan-status">起動時スキャンとフォルダ監視を開始しています...</p>
            </article>
            <article class="panel">
              <h2>現在の蔵書数</h2>
              <p class="stat" id="indexed-count">0</p>
            </article>
          </section>

          <section class="panel">
            <div class="library-header">
              <h2>本棚</h2>
            </div>
            <div id="book-results">
              <div class="empty-state">読み込み中...</div>
            </div>
          </section>
        </section>

        <section id="pdf-view" class="pdf-view" hidden>
          <article class="viewer-panel">
            <button id="viewer-settings-toggle" class="viewer-settings-toggle" type="button" hidden>
              表示
            </button>
            <section id="viewer-settings-panel" class="viewer-settings-panel" hidden>
              <div class="viewer-setting-tabs" role="tablist" aria-label="設定対象">
                <button
                  id="viewer-settings-scope-global"
                  class="viewer-setting-tab"
                  type="button"
                  role="tab"
                  aria-selected="true"
                  data-scope="global"
                >
                  全体
                </button>
                <button
                  id="viewer-settings-scope-file"
                  class="viewer-setting-tab"
                  type="button"
                  role="tab"
                  aria-selected="false"
                  data-scope="file"
                >
                  ファイル
                </button>
              </div>
              <label class="viewer-setting">
                <span>ページ表示</span>
                <select id="viewer-page-mode">
                  <option value="spread">2ページ</option>
                  <option value="single">単ページ</option>
                </select>
              </label>
              <label class="viewer-setting">
                <span>綴じ方向</span>
                <select id="viewer-binding-direction">
                  <option value="left">左綴じ</option>
                  <option value="right">右綴じ</option>
                </select>
              </label>
              <label class="viewer-setting">
                <span>ズーム</span>
                <select id="viewer-zoom-mode">
                  <option value="fit-width">幅に合わせる</option>
                  <option value="fit-height">高さに合わせる</option>
                  <option value="original">オリジナル</option>
                </select>
              </label>
              <label class="viewer-setting">
                <span>表示位置</span>
                <select id="viewer-align-mode">
                  <option value="left">左寄せ</option>
                  <option value="center">中央</option>
                  <option value="right">右寄せ</option>
                </select>
              </label>
              <label class="viewer-setting">
                <span>上下余白</span>
                <select id="viewer-vertical-gap-mode">
                  <option value="wide">広い</option>
                  <option value="compact">狭い</option>
                  <option value="none">ゼロ</option>
                </select>
              </label>
              <label class="viewer-setting viewer-checkbox">
                <input id="viewer-cover-mode" type="checkbox" checked />
                <span>1ページ目を表紙にする</span>
              </label>
            </section>
            <div class="viewer-stage">
              <iframe id="pdf-frame" title="PDF preview"></iframe>
              <div id="pdfjs-viewer" class="pdfjs-viewer pdfViewer" hidden></div>
            </div>
          </article>
        </section>

        <button id="note-toggle" class="note-toggle-button" type="button" hidden>
          ノート
        </button>
        <aside id="note-panel" class="note-panel" hidden>
          <div class="note-panel-header" id="note-drag-handle">
            <p class="note-panel-label">ノート</p>
            <button id="note-close" class="note-close-button" type="button" aria-label="ノートを閉じる">
              ×
            </button>
          </div>
          <div id="note-editor" class="note-editor"></div>
          <div class="note-resize-handle note-resize-handle-n" data-resize="n"></div>
          <div class="note-resize-handle note-resize-handle-e" data-resize="e"></div>
          <div class="note-resize-handle note-resize-handle-s" data-resize="s"></div>
          <div class="note-resize-handle note-resize-handle-w" data-resize="w"></div>
          <div class="note-resize-handle note-resize-handle-ne" data-resize="ne"></div>
          <div class="note-resize-handle note-resize-handle-se" data-resize="se"></div>
          <div class="note-resize-handle note-resize-handle-sw" data-resize="sw"></div>
          <div class="note-resize-handle note-resize-handle-nw" data-resize="nw"></div>
        </aside>
      </section>
    </main>
  </body>
</html>
