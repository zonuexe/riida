<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        // Mirror of the early-theme inline script in index.html. The literal
        // here must stay in sync with APP_THEME_STORAGE_KEY in src/app-theme.ts.
        const key = "riida.appTheme";
        const theme = localStorage.getItem(key);
        if (!theme) {
          return;
        }

        const root = document.documentElement;
        root.dataset.theme = theme;
        root.style.colorScheme = theme === "night-city" || theme === "navy-blue" ? "dark" : "light";
      })();
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>riida viewer</title>
    <script type="module" src="/src/main-viewer.ts" defer></script>
  </head>

  <body data-startup="loading" data-window-role="viewer">
    <main class="app-shell viewer-only">
      <section class="main-pane" id="main-pane">
        <div class="viewer-navigation-overlay">
          <div class="navigation-controls" aria-label="History">
            <button id="nav-back" class="navigation-button" type="button" aria-label="Back" disabled>
              <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
            </button>
            <button
              id="nav-forward"
              class="navigation-button"
              type="button"
              aria-label="Forward"
              disabled
            >
              <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
            </button>
          </div>
          <div id="viewer-page-jump" class="viewer-page-jump" hidden>
            <form id="viewer-page-jump-form" class="viewer-page-jump-form">
              <input
                id="viewer-page-jump-input"
                class="viewer-page-jump-input"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                spellcheck="false"
                aria-label="Page number"
              />
              <span
                id="viewer-page-jump-total"
                class="viewer-page-jump-total"
                aria-hidden="true"
              ></span>
              <button id="viewer-page-jump-go" class="viewer-page-jump-go" type="submit">Go</button>
            </form>
          </div>
        </div>
        <button id="epub-toc-toggle" class="epub-toc-toggle" type="button" aria-label="目次" hidden>
          <i class="fa-solid fa-list-ol" aria-hidden="true"></i>
        </button>
        <div id="epub-toc-panel" class="epub-toc-panel" hidden>
          <div id="epub-toc-list" class="epub-toc-list"></div>
        </div>
        <div id="viewer-overlay-controls" class="viewer-overlay-controls" hidden>
          <button
            id="viewer-settings-toggle"
            class="viewer-settings-toggle"
            type="button"
            aria-label="Open viewer settings"
          >
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
          </button>
        </div>
        <section id="viewer-settings-panel" class="viewer-settings-panel" hidden>
          <div class="viewer-setting-tabs" role="tablist" aria-label="設定対象">
            <button
              id="viewer-settings-scope-global"
              class="viewer-setting-tab"
              type="button"
              role="tab"
              aria-selected="true"
              data-scope="global"
            >
              全体
            </button>
            <button
              id="viewer-settings-scope-file"
              class="viewer-setting-tab"
              type="button"
              role="tab"
              aria-selected="false"
              data-scope="file"
            >
              ファイル
            </button>
          </div>
          <p id="viewer-settings-source-label" class="viewer-settings-source-label">PDF</p>
          <div id="viewer-settings-reader-fields">
            <label class="viewer-setting">
              <span>ページ表示</span>
              <select id="viewer-page-mode">
                <option value="spread">2ページ</option>
                <option value="single">単ページ</option>
              </select>
            </label>
            <label class="viewer-setting">
              <span>綴じ方向</span>
              <select id="viewer-binding-direction">
                <option value="auto">自動判定</option>
                <option value="left">左綴じ</option>
                <option value="right">右綴じ</option>
              </select>
            </label>
            <label class="viewer-setting pdf-only">
              <span>ズーム</span>
              <select id="viewer-zoom-mode">
                <option value="fit-width">幅に合わせる</option>
                <option value="fit-height">高さに合わせる</option>
                <option value="original">オリジナル</option>
              </select>
            </label>
            <label class="viewer-setting epub-only">
              <span>文字サイズ</span>
              <div class="viewer-font-size-control">
                <input
                  type="range"
                  id="viewer-epub-font-size"
                  min="50"
                  max="200"
                  step="10"
                  value="100"
                />
                <output id="viewer-epub-font-size-output" for="viewer-epub-font-size">100%</output>
              </div>
            </label>
            <label class="viewer-setting">
              <span>表示位置</span>
              <select id="viewer-align-mode">
                <option value="left">左寄せ</option>
                <option value="center">中央</option>
                <option value="right">右寄せ</option>
              </select>
            </label>
            <label class="viewer-setting">
              <span>スクロール</span>
              <select id="viewer-scroll-mode">
                <option value="continuous">連続スクロール</option>
                <option value="paged">ページ単位</option>
              </select>
            </label>
            <label class="viewer-setting">
              <span>上下余白</span>
              <select id="viewer-vertical-gap-mode">
                <option value="wide">広い</option>
                <option value="compact">狭い</option>
                <option value="none">ゼロ</option>
              </select>
            </label>
            <section class="viewer-setting viewer-setting-swatches">
              <span>背景色</span>
              <div
                id="viewer-background-mode"
                class="viewer-background-swatches"
                role="radiogroup"
                aria-label="Viewer background color"
              >
                <label class="viewer-background-option">
                  <input
                    type="radio"
                    name="viewer-background-mode"
                    value="default"
                    aria-label="Default"
                  />
                  <span
                    class="viewer-background-swatch"
                    data-background-mode="default"
                    aria-hidden="true"
                  ></span>
                </label>
                <label class="viewer-background-option">
                  <input
                    type="radio"
                    name="viewer-background-mode"
                    value="snow-white"
                    aria-label="Snow White"
                  />
                  <span
                    class="viewer-background-swatch"
                    data-background-mode="snow-white"
                    aria-hidden="true"
                  ></span>
                </label>
                <label class="viewer-background-option">
                  <input
                    type="radio"
                    name="viewer-background-mode"
                    value="night-city"
                    aria-label="Night City"
                  />
                  <span
                    class="viewer-background-swatch"
                    data-background-mode="night-city"
                    aria-hidden="true"
                  ></span>
                </label>
                <label class="viewer-background-option">
                  <input
                    type="radio"
                    name="viewer-background-mode"
                    value="navy-blue"
                    aria-label="Navy Blue"
                  />
                  <span
                    class="viewer-background-swatch"
                    data-background-mode="navy-blue"
                    aria-hidden="true"
                  ></span>
                </label>
              </div>
              <label class="viewer-background-inherit">
                <input id="viewer-background-inherit" type="checkbox" />
                <span>アプリケーション設定を反映</span>
              </label>
            </section>
            <div class="viewer-settings-divider" aria-hidden="true"></div>
            <label class="viewer-setting viewer-checkbox">
              <input id="viewer-cover-mode" type="checkbox" checked />
              <span>1ページ目を表紙にする</span>
            </label>
          </div>
        </section>
        <div id="viewer-window-status" class="viewer-window-status">
          <p id="viewer-window-target" class="viewer-window-target">
            <!-- main-viewer.ts fills this with the requested book path -->
          </p>
        </div>
        <div id="pdfjs-viewer" class="pdfjs-viewer viewer-window-pdfjs" hidden></div>
        <div id="epub-viewer" class="epub-viewer viewer-window-epub" hidden></div>

        <button id="note-toggle" class="note-toggle-button" type="button" hidden>
          <i class="fa-solid fa-note-sticky" aria-hidden="true"></i>
          <span>Notes</span>
        </button>
        <aside id="note-panel" class="note-panel" hidden>
          <div class="note-panel-header" id="note-drag-handle">
            <p class="note-panel-label">Notes</p>
            <button
              id="note-close"
              class="note-close-button"
              type="button"
              aria-label="Close notes"
            >
              ×
            </button>
          </div>
          <div id="note-editor" class="note-editor"></div>
          <div class="note-resize-handle note-resize-handle-n" data-resize="n"></div>
          <div class="note-resize-handle note-resize-handle-e" data-resize="e"></div>
          <div class="note-resize-handle note-resize-handle-s" data-resize="s"></div>
          <div class="note-resize-handle note-resize-handle-w" data-resize="w"></div>
          <div class="note-resize-handle note-resize-handle-ne" data-resize="ne"></div>
          <div class="note-resize-handle note-resize-handle-se" data-resize="se"></div>
          <div class="note-resize-handle note-resize-handle-sw" data-resize="sw"></div>
          <div class="note-resize-handle note-resize-handle-nw" data-resize="nw"></div>
        </aside>
      </section>
    </main>
  </body>
</html>
